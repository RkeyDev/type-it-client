<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/pages/styles.css">
    <link rel="stylesheet" href="styles.css">
    <title>Type It!</title>
</head>
<body>
    <div id="main-menu-container">
        <div id="logo">
            <img src="/src/assets/Logo.png" alt="Logo" id="logo-image">
        </div>
        <div id="main-menu-buttons-container">
            <form id="room-code-form">
                <div class="input-group">
                    <input type="text" id="room-code-textfield"  name="room-code" placeholder="Enter Room Code..." maxlength="15">
                </div>
                <button type="submit" id="join-room-button">Join Room</button>
            </form>
            <button id="matchmaking-button">Matchmaking</button>
            <button id="create-room-button">Create Room</button>
        </div>
    </div>

    <script src="main_menu_scripts.js"></script>
</body>
</html>
