<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/src/pages/styles.css">
  <link rel="stylesheet" href="styles.css">
  <title>Type It!</title>
</head>

<body>
  <div id="main-menu-container">
    <div id="logo">
      <img src="/src/assets/Logo.png" alt="Logo" id="logo-image">
    </div>

    <div id="scale-wrapper"> 
      <div class="game-container">
        
        <!-- Timer -->
        <span class="timer">
          Time left: <span id="time-left">--</span> sec
        </span>

        <!-- Players -->
         <div id="players-container"></div>

        <!-- Center stage (waiting text, countdown, word gains, question box) -->
        <div class="center">
          <span id="game-waiting-text">Waiting to start...</span>
          <h2 id="word-length" hidden>+10 characters</h2>
        </div>
      </div>
    </div> 
  </div>

  <!-- Game logic -->
  <script src="game_scripts.js" defer></script>
</body>
</html>
