<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/pages/styles.css">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>
<body>
    <div id="page-container">
        <div id="logo">
            <img src="/src/assets/Logo.png" alt="Logo" id="logo-image">
        </div>
        <div id="login-form-container">
            <form id="login-form" action="/src/pages/home-page/home.html" method="post">
                <div class="input-group">
                    <input type="text" id="username-textfield" name="username" placeholder="Enter Your Nickname..." maxlength="10" required>
                </div>
                <div id="change-skin-container">
                    <button type="button" class="arrow-button"> <img  src="/src/assets/Arrow-Left.png" alt="Change Skin" ></button>
                    <img src="/src/assets/Mock-Yellow-Skin.png" alt="Change Skin" id="change-skin-icon">
                    <button type="button" class="arrow-button"> <img src="/src/assets/Arrow-Right.png" alt="Change Skin"> </button> 
                </div>
                <button type="submit" id="submit-button">Continue</button>
            </form>
    </div>

    <script src="login_scripts.js"></script>
</body>
</html>
