<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/pages/styles.css">
    <link rel="stylesheet" href="styles.css">
    <title>Type It!</title>
</head>

<body>
    
    <div id="main-menu-container">
        <div id="logo">
            <img src="/src/assets/Logo.png" alt="Logo" id="logo-image">
        </div>

    <div id="scale-wrapper"> 
        <div class="game-container">
        <span class="timer">Time left: <span id="time-left">--</span> sec</span>

        <div class="player p1"><div class="circle"><img src="/src/assets/skins/default-skin.png" style="width: 120%;"> <span class="name">Player 1</span></div></div>
        <div class="player p2"><div class="circle"> <img src="/src/assets/skins/alien-skin.png" style="width: 120%;"> <span class="name">Player 2</span></div></div>
        <div class="player p3"><div class="circle"> <img src="/src/assets/skins/glasses-suit-skin.png" style="width: 120%;"> <span class="name">Player 3</span></div></div>
        <div class="player p4"><div class="circle"> <img src="/src/assets/skins/glasses-suit-skin.png" style="width: 120%;"> <span class="name">Player 4</span></div></div>
        <div class="player p5"><div class="circle"> <img src="/src/assets/skins/alien-skin.png" style="width: 120%;"> <span class="name">Player 5</span></div></div>
        <div class="player p6"><div class="circle"> <img src="/src/assets/skins/default-skin.png" style="width: 120%;"> <span class="name">Player 6</span></div></div>
        <div class="player p7"><div class="circle"> <img src="/src/assets/skins/glasses-suit-skin.png" style="width: 120%;"> <span class="name">Player 7</span></div></div>
        <div class="player p8"><div class="circle"> <img src="/src/assets/skins/default-skin.png" style="width: 120%;"> <span class="name">Player 8</span></div></div>

        <div class="center"><span id="game-waiting-text">Waiting to start...</span></div>
        
    </div>
  </div> 
    <script src="game_scripts.js" defer></script>

</html>
