<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/pages/styles.css">
    <link rel="stylesheet" href="styles.css">
    <title>Type It!</title>
</head>
<body>
    <div id="lobby-container">
        <img src="/src/assets/Logo.png" alt="Logo" id="logo-image">
        <div id="room-code-container">
            <h1 id="room-code-text">Room Code</h1>
            <button id="room-code-button" onclick="copyRoomCode()">15293716</button>
        </div>
        <div room-settings-players-wrapper>
            <div id="room-settings-container">
                    <form id="room-settings-form">
                        <div id="typing-time-container">
                            <h2 id="typing-time-header">Typing Time</h2>
                            <div id="typing-time-slider-container">
                                <label id="time-label">5 sec</label>
                                <input type="range" class="slider" min="5" max="120" value="60" oninput="document.getElementById('current-time').textContent = this.value + ' sec'">
                                <label id="time-label">120 sec</label>
                            </div>
                            <label id="current-time">60 sec</label>
                        </div><br>

                        <div id="game-rounds-container">
                            <h2 id="rounds-header">Rounds</h2>
                            <div id="game-rounds-slider-container">
                                <label id="round-label">1</label>
                                <input type="range" class="slider" min="1" max="30" value="5" oninput="document.getElementById('current-round').textContent = this.value">
                                <label id="round-label">30</label>
                            </div>
                            <label id="current-round">5</label>
                        </div>
                        <div id="languages-dropdown-container">
                            <select id="languages-dropdown" name="languages">
                                <option value="english">English</option>
                                <option value="hebrew">Hebrew</option>
                                <option value="german">German</option>
                            </select>
                        </div>
                        <div id="start-game-button-container">
                            <input type="submit" id="start-game-button" value="Start">
                        </div>
                    </form>
                    
                </div>

            <div id="players-container">
                <h1 id="players-title">Players</h1>
                <div id="players-list">
                    <div class="player-slot">
                        <h1 class="player-name">Player1</h1>   
                        <img src="/src/assets/skins/default-skin.png" alt="Player Icon" class="player-icon">
                    </div>

                </div>
            </div>

            </div>
        </div>
    </div>
    </div>

    <script src="lobby_scripts.js"></script>
</body>
</html>
