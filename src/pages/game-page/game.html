<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/pages/styles.css">
    <link rel="stylesheet" href="styles.css">
    <title>Type It!</title>
</head>

<body>
    
    <div id="main-menu-container">
        <div id="logo">
            <img src="/src/assets/Logo.png" alt="Logo" id="logo-image">
        </div>

    <div id="scale-wrapper"> 
        <div class="game-container">
        <span class="timer">Time left: 120 sec</span>

        <div class="player p1"><div class="circle"> <br> <span class="name">Player 1</span></div></div>
        <div class="player p2"><div class="circle"> <br> <span class="name">Player 2</span></div></div>
        <div class="player p3"><div class="circle"> <br> <span class="name">Player 3</span></div></div>
        <div class="player p4"><div class="circle"> <br> <span class="name">Player 4</span></div></div>
        <div class="player p5"><div class="circle"> <br> <span class="name">Player 5</span></div></div>
        <div class="player p6"><div class="circle"> <br> <span class="name">Player 6</span></div></div>
        <div class="player p7"><div class="circle"> <br> <span class="name">Player 7</span></div></div>
        <div class="player p8"><div class="circle"> <br> <span class="name">Player 8</span></div></div>

        <textarea class="center" placeholder="Name a country..."></textarea>
    </div>
  </div> 
    <script src="game_scripts.js"></script>
</body>
</html>
